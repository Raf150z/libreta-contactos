{% extends 'base.html' %}
{% block title %}Iniciar Sesión{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-lg border-0">
            <div class="card-header bg-primary text-white text-center py-4">
                <i class="fas fa-sign-in-alt fa-3x mb-3"></i>
                <h3 class="mb-0">Iniciar Sesión</h3>
            </div>
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    {% if form.errors %}
                    <div class="alert alert-danger">
                        <i class="fas fa-exclamation-triangle"></i>
                        Usuario o contraseña incorrectos.
                    </div>
                    {% endif %}
                    <div class="mb-3">
                        <label for="id_username" class="form-label"><i class="fas fa-user me-2"></i>Usuario</label>
                        <input type="text" name="username" class="form-control" id="id_username" required>
                    </div>
                    <div class="mb-4">
                        <label for="id_password" class="form-label"><i class="fas fa-lock me-2"></i>Contraseña</label>
                        <input type="password" name="password" class="form-control" id="id_password" required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="fas fa-sign-in-alt me-2"></i>Entrar
                        </button>
                    </div>
                </form>
            </div>
            <div class="card-footer bg-light text-center p-3">
                <p class="mb-0">
                    ¿No tienes cuenta? 
                    <a href="{% url 'registrar' %}" class="text-primary fw-bold">Regístrate aquí</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
