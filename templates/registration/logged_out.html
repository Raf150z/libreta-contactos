{% extends 'base.html' %}

{% block title %}Sesión Cerrada{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-lg border-0 text-center">
            <div class="card-header bg-success text-white py-4">
                <i class="fas fa-check-circle fa-3x mb-3"></i>
                <h3 class="mb-0">¡Sesión Cerrada!</h3>
            </div>
            <div class="card-body p-5">
                <i class="fas fa-door-open fa-4x text-muted mb-4"></i>
                <p class="lead mb-4">Has cerrado sesión exitosamente.</p>
                <p class="text-muted mb-4">Gracias por usar Mi Libreta de Contactos.</p>
                <div class="d-grid gap-3">
                    <a href="{% url 'login' %}" class="btn btn-primary btn-lg">
                        <i class="fas fa-sign-in-alt me-2"></i>Iniciar sesión nuevamente
                    </a>
                    <a href="{% url 'home' %}" class="btn btn-outline-secondary">
                        <i class="fas fa-home me-2"></i>Ir al inicio
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
